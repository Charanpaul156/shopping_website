<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopKart - Welcome</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="logo">ShopKart</h1>
            <nav class="nav">
                <a href="login.html" class="nav-link">Login</a>
                <a href="signup.html" class="nav-link primary">Sign Up</a>
            </nav>
        </header>

        <main class="main">
            <div class="hero">

                    <a href="signup.html" class="btn btn-primary">Get Started</a>
                    <a href="login.html" class="btn btn-secondary">Login</a>
                </div>
            </div>

            <div class="features">
                <div class="feature">
                    <h3>Men's Collection</h3>
                    <p>Ethnic and Western wear for men</p>
                </div>
                <div class="feature">
                    <h3>Women's Collection</h3>
                    <p>Elegant ethnic and western outfits</p>
                </div>
                <div class="feature">
                    <h3>Kids Collection</h3>
                    <p>Adorable clothes for boys and girls</p>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>

</html>
