<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - ShopHub</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="logo"><a href="index.html">ShopKart</a></h1>
            <nav class="nav">
                <a href="categories.html" class="nav-link">Continue Shopping</a>
                <a href="#" onclick="logout()" class="nav-link">Logout</a>
            </nav>
        </header>

        <main class="main">
            <div class="page-header">
                <h2>Shopping Cart</h2>
                <p>Review your items before checkout</p>
            </div>

            <div class="cart-container">
                <div id="cartItems" class="cart-items">
                    <!-- Cart items will be populated by JavaScript -->
                </div>

                <div id="emptyCart" class="empty-cart" style="display: none;">
                    <h3>Your cart is empty</h3>
                    <p>Start shopping to add items to your cart.</p>
                    <a href="categories.html" class="btn btn-primary">Start Shopping</a>
                </div>

                <div id="cartSummary" class="cart-summary" style="display: none;">
                    <h3>Order Summary</h3>
                    <div class="summary-row">
                        <span>Subtotal:</span>
                        <span id="subtotal">₹0.00</span>
                    </div>
                    <div class="summary-row">
                        <span>Taxes (5%):</span>
                        <span id="taxes">₹0.00</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total:</span>
                        <span id="total">₹0.00</span>
                    </div>
                    <a href="checkout.html" class="btn btn-primary btn-full">Proceed to Checkout</a>
                </div>
            </div>
        </main>
    </div>

    <script src="cart.js"></script>
</body>
</html>
