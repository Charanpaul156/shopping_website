<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - ShopKart</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="logo"><a href="index.html">ShopKart</a></h1>
            <nav class="nav">
                <a href="cart.html" class="nav-link">Back to Cart</a>
                <a href="#" onclick="logout()" class="nav-link">Logout</a>
            </nav>
        </header>

        <main class="main">
            <div class="page-header">
                <h2>Checkout</h2>
                <p>Complete your purchase</p>
            </div>

            <div class="checkout-container">
                <div class="checkout-form">
                    <h3>Payment Information</h3>
                    <form id="checkoutForm" class="form">
                        <div class="form-group">
                            <label for="cardHolder">Card Holder Name</label>
                            <input type="text" id="cardHolder" name="cardHolder" required>
                            <span class="error-message" id="cardHolderError"></span>
                        </div>

                        <div class="form-group">
                            <label for="cardNumber">Card Number</label>
                            <input type="text" id="cardNumber" name="cardNumber" placeholder="1234 5678 9012 3456" required>
                            <span class="error-message" id="cardNumberError"></span>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="expiryDate">Expiry Date</label>
                                <input type="text" id="expiryDate" name="expiryDate" placeholder="MM/YY" required>
                                <span class="error-message" id="expiryDateError"></span>
                            </div>

                            <div class="form-group">
                                <label for="cvv">CVV</label>
                                <input type="text" id="cvv" name="cvv" placeholder="123" required>
                                <span class="error-message" id="cvvError"></span>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-full">Complete Purchase</button>
                    </form>
                </div>

                <div class="order-summary">
                    <h3>Order Summary</h3>
                    <div id="checkoutItems" class="checkout-items">
                        <!-- Items will be populated by JavaScript -->
                    </div>
                    <div class="summary-totals">
                        <div class="summary-row">
                            <span>Subtotal:</span>
                            <span id="checkoutSubtotal">₹0.00</span>
                        </div>
                        <div class="summary-row">
                            <span>Taxes (5%):</span>
                            <span id="checkoutTaxes">₹0.00</span>
                        </div>
                        <div class="summary-row total">
                            <span>Total:</span>
                            <span id="checkoutTotal">₹0.00</span>
                        </div>
                    </div>
                </div>
            </div>

            <div id="successMessage" class="success-message" style="display: none;">
                <div class="success-icon">✅</div>
                <h3>Thank you for your purchase!</h3>
                <p>Your order has been placed successfully.</p>
                <a href="categories.html" class="btn btn-primary">Continue Shopping</a>
            </div>
        </main>
    </div>

    <script src="checkout.js"></script>
</body>
</html>
